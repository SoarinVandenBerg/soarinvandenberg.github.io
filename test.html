<!DOCTYPE html>
<html>
  <head>
    <link rel="icon" href="website_icon.png">
    <title>Soarin's Website</title>
    <link rel="stylesheet" href="style.css">
    <meta name="robots" content="noindex">
  </head>
  <body>
    <div class="background">
  <div class="popup">
    <p class="header">Are you sure?</p>

    <div class="buttonbox">
      <button class="popupbuttons yes">Yes</button>
      <button class="popupbuttons no">No</button>
    </div>

  </div>
</div>

<button class="openPopup">Open Popup</button>


    <script src="offline.js"></script>
    <script>const overlay = document.querySelector(".background");
const yesBtn = document.querySelector(".yes");
const noBtn = document.querySelector(".no");
const openBtn = document.querySelector(".openPopup");

openBtn.onclick = () => {
  overlay.style.display = "flex";
};

yesBtn.onclick = () => overlay.style.display = "none";
noBtn.onclick = () => overlay.style.display = "none";

    </script>

  </body>
</html>
