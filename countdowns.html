<!DOCTYPE html>
<html>
  <head>
    <link rel="icon" href="website_icon.png">
    <title>Soarin's Website</title>
    <link rel="stylesheet" href="style.css">
    <meta name="robots" content="noindex">
  </head>
  <body>
    <p class="title">  
        Countdowns!
    </p><br><br>

    <p class="header">
        Time until end of the school day:
    </p>
    <p id="countdown1" class="countdown"></p>
    <br>
    <p class="header">
        Time until end of class: (WORK IN PROGRESS)
    </p>
    <p id="countdown2" class="countdown"></p>




    <p class="text"><br><br>
        The idea of this page is from <a href="https://neal.fun/progress/" target="_blank">Neal.fun's progress page.</a> :D
    </p>
    <br><br>
    <p class="text">
    <a href="https://soarinvandenberg.ca"><-- Exit</a>
    </p>

    <script>
        const now = new Date();
        const day = now.getDay();

        const startTime = new Date();
        startTime.setHours(8, 40, 0, 0);

        const endTime = new Date();
        endTime.setHours(15, 10, 0, 0);


        if (day === 0 || day === 6) {
            document.getElementById("countdown1").innerText = "School is not in session!";
        }
        else if (now < startTime) {
            document.getElementById("countdown1").innerText = "School is not in session!";
        }
        else if (now > endTime) {
            document.getElementById("countdown1").innerText = "School is not in session!";
        }
        else {
            setInterval(() => {
                const pad = (num) => String(num).padStart(2, "0");
                const now = new Date();
                const diff = endTime - now;

                if (diff <= 0) {
                    document.getElementById("countdown1").innerText = "School is not in session!";
                    return;
                }

                const hours = Math.floor(diff / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById("countdown1").innerText =
                `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
            }, 1000);
        }
        
        const now2 = new Date();
        const day2 = now2.getDay();
        
        if (day2 === 3) {
        const currentTime = now2.getHours() * 60 + now2.getMinutes();

        let block = "";
        let end = null;

        if (currentTime < 8 * 60 + 40) {
            block = "Before school";
            end = 8 * 60 + 40;
        }
        else if (currentTime <  10 * 60) {
            block = "class1";
            end = 10 * 60;
        }
        else if (currentTime <  10 * 60 + 10) {
            block = "break";
            end = null;
        }
        else if (currentTime <  11 * 60 + 30) {
            block = "class2";
            end = 11 * 60 + 30;
        }
        else if (currentTime <  12 * 60 + 20) {
            block = "lunch";
            end = 12 * 60 + 20;
        }
        else if (currentTime <  13 * 60 + 40) {
            block = "class3";
            end = 13 * 60 + 40;
        }
        else if (currentTime <  13 * 60 + 50) {
            block = "break";
            end = 13 * 60 + 50;
        }
        else if (currentTime <  15 * 60 + 10) {
            block = "class4";
            end = 15 * 60 + 10;
        }
        else {
            block = "After school";
            end = null;
        }

        if (block === "Before school" || block === "After school") {
            document.getElementById("countdown2").innerText = "School is not in session!";
        }
        else if (block === "break") {
            document.getElementById("countdown2").innerText = "School is not in session!";
        }
        else {
            setInterval(() => {
                const now2 = new Date();
                const currentTime = now2.getHours() * 60 + now2.getMinutes();
                const currentSeconds = now2.getSeconds();

                const nowInSeconds = currentTime * 60 + currentSeconds;

                const endInSeconds = end * 60;
                const diff = endInSeconds - nowInSeconds;
                
                if (diff <= 0) {
                    document.getElementById("countdown2").innerText = "School is not in session!";
                    return;
                }

                const hours = Math.floor(diff / 3600);
                const minutes = Math.floor((diff % 3600) / 60);
                const seconds = diff % 60;

                const pad = (n) => String(n).padStart(2, "0");

                document.getElementById("countdown2").innerText =
                    `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
            }, 1000);
        }
    } else {
        document.getElementById("countdown2").innerText = "This day is not supported!";
    }

    </script>
  </body>
</html>
