<!DOCTYPE html>
<html>
  <head>
    <link rel="icon" href="website_icon.png">
    <title>Soarin's Website</title>
    <link rel="stylesheet" href="style.css">
    <meta name="robots" content="noindex">
  </head>
  <body>
    <p class="title">  
        Countdowns!
    </p><br><br>

    <p class="header">
        Time until end of the school day:
    </p>
    <p id="countdown" class="countdown"></p>




    <p class="text"><br><br>
        The idea of this page is from <a href="https://neal.fun/progress/" target="_blank">Neal.fun's progress page.</a> :D
    </p>
    <br><br><br>
    <p class="text">
    <a href="https://soarinvandenberg.ca"><-- Exit</a>
    </p>

    <script>
        const now = new Date();
        const day = now.getDay();

        const startTime = new Date();
        startTime.setHours(8, 40, 0, 0);

        const endTime = new Date();
        endTime.setHours(15, 10, 0, 0);


        if (day === 0 || day === 6) {
            document.getElementById("countdown").innerText = "School is not in session!";
        }
        else if (now < startTime) {
            document.getElementById("countdown").innerText = "School is not in session!";
        }
        else if (now > endTime) {
            document.getElementById("countdown").innerText = "School is not in session!";
        }
        else {
            setInterval(() => {
                const pad = (num) => String(num).padStart(2, "0");
                const now = new Date();
                const diff = endTime - now;

                if (diff <= 0) {
                    document.getElementById("countdown").innerText = "School is not in session!";
                    return;
                }

                const hours = Math.floor(diff / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById("countdown").innerText =
                `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
            }, 1000);
        }


    </script>
  </body>
</html>
