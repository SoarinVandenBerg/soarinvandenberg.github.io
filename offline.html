<!DOCTYPE html>
<html>
  <head>
    <link rel="icon" href="clutter/website_icon.png">
    <title>Soarin's Website</title>
    <link rel="stylesheet" href="style.css">
    <meta name="robots" content="noindex">
  </head>
  <body>
    <p class="header">
      503<br>
    </p><p class="text">
        This site is permanently closed.
    </p>
    <script>
      const unlockSequence = ["4", "2"];
      let unlockPosition = 0;

      document.addEventListener("keydown", (event) => {
        if (event.key === unlockSequence[unlockPosition]) {
          unlockPosition++;

          if (unlockPosition === unlockSequence.length) {
            
            localStorage.setItem("deviceAllowed", "true");
            window.location.href = "/";
            unlockPosition = 0;
          }
        } else {
          unlockPosition = 0;
        }
      });
</script>
    </script>
  </body>
</html>
